spring.application.name=qa-service-user
server.port=8080

# 数据库配置 - 使用H2内存数据库进行开发测试
spring.datasource.url=jdbc:h2:mem:qa_healthcare_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA配置
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop  # 开发环境使用create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# 跨域配置
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=false
spring.web.cors.max-age=3600

# Actuator 配置
# 启用所有端点
management.endpoints.web.exposure.include=health,info,metrics,env,beans,loggers
# 显示详细的健康信息
management.endpoint.health.show-details=always
# 启用健康检查组件
management.endpoint.health.show-components=always
# 自定义管理端点基础路径（可选）
management.endpoints.web.base-path=/actuator
# 启用 info 端点的贡献者
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
# 数据库健康检查
management.health.db.enabled=true

# 应用信息配置
info.app.name=qa-service-user
info.app.description=QA Service User - Healthcare QA System User Management Service
info.app.version=0.0.1-SNAPSHOT
info.app.encoding=UTF-8
info.app.java.version=17
info.team=QA Healthcare Team
info.environment=development
info.build.timestamp=${BUILD_TIME:2025-11-03}
info.features=CORS,Actuator,Health Checks,User Management,MySQL Database,JPA
